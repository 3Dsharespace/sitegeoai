# GeoAI 3D Construction Planner — Render Blueprint
# Docs: DEPLOYMENT.md
# Validate: render blueprints validate render.yaml

databases:
  - name: geoai-postgres
    databaseName: geoai
    user: geoai
    plan: basic-256mb
    region: oregon
    postgresMajorVersion: "16"

envVarGroups:
  - name: geoai-backend
    envVars:
      - key: ENVIRONMENT
        value: production
      - key: AUTH_REQUIRE_JWT
        value: "true"
      - key: GENERATION_JOB_TIMEOUT_SECONDS
        value: "300"
      - key: USE_ARQ_WORKER
        value: "true"
      - key: USAGE_LIMITS_ENABLED
        value: "true"
      - key: RATE_LIMITING_ENABLED
        value: "true"
      - key: APP_SECRET
        generateValue: true
      - key: NEXT_PUBLIC_APP_URL
        sync: false
      # --- Optional: set in Render dashboard after first deploy ---
      - key: S3_ENDPOINT
        sync: false
      - key: S3_BUCKET
        sync: false
      - key: S3_ACCESS_KEY
        sync: false
      - key: S3_SECRET_KEY
        sync: false
      - key: OPENAI_API_KEY
        sync: false
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: AI_PROVIDER
        sync: false
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: CESIUM_ION_TOKEN
        sync: false
      - key: MAPBOX_TOKEN
        sync: false
      - key: OLLAMA_BASE_URL
        sync: false

services:
  - type: keyvalue
    name: geoai-redis
    plan: free
    region: oregon
    maxmemoryPolicy: allkeys-lru
    ipAllowList: []

  - type: web
    name: geoai-api
    runtime: python
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    envVars:
      - fromGroup: geoai-backend
      - key: DATABASE_URL
        fromDatabase:
          name: geoai-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: geoai-redis
          property: connectionString

  - type: worker
    name: geoai-worker
    runtime: python
    region: oregon
    plan: starter
    rootDir: backend
    buildCommand: pip install -r requirements.txt && alembic upgrade head
    startCommand: arq app.workers.tasks.WorkerSettings
    envVars:
      - fromGroup: geoai-backend
      - key: DATABASE_URL
        fromDatabase:
          name: geoai-postgres
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: keyvalue
          name: geoai-redis
          property: connectionString
