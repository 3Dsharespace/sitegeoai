services:
  db:
    image: postgis/postgis:16-3.4
    container_name: geoai-db
    environment:
      POSTGRES_USER: geoai
      POSTGRES_PASSWORD: geoai
      POSTGRES_DB: geoai
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U geoai"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: geoai-redis
    ports:
      - "6379:6379"
    volumes:
      - redisdata:/data

  minio:
    image: minio/minio:latest
    container_name: geoai-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: geoai
      MINIO_ROOT_PASSWORD: geoai-secret
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - miniodata:/data

volumes:
  pgdata:
  redisdata:
  miniodata:
